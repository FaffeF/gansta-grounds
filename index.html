<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport">
  <title>Kartoverlay</title>
  <meta content="#111827" name="theme-color">
  <link href="https://unpkg.com" rel="preconnect">
  <link crossorigin="" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" rel="stylesheet">
  <style>
    :root { --bg:#0b1220; --panel:rgba(15,23,42,.82); --text:#f8fafc; --muted:#cbd5e1; --accent:#38bdf8; --line:rgba(255,255,255,.14); }
    * { box-sizing: border-box; }
    html, body { height:100%; margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--text); }
    #map { position:fixed; inset:0; }
    .panel { position:fixed; left:12px; right:12px; top:max(12px, env(safe-area-inset-top)); z-index:1000; background:var(--panel); backdrop-filter:blur(10px); border:1px solid var(--line); border-radius:14px; padding:10px 12px; box-shadow:0 10px 30px rgba(0,0,0,.25); }
    .row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .title { font-size:16px; font-weight:700; }
    .meta { font-size:13px; color:var(--muted); }
    .spacer { flex:1 1 auto; }
    button { appearance:none; border:1px solid var(--line); background:rgba(255,255,255,.08); color:var(--text); border-radius:10px; padding:10px 12px; font-size:14px; font-weight:600; min-height:44px; }
    button.primary { background:var(--accent); color:#082f49; border-color:transparent; }
    .hint { position:fixed; left:12px; right:12px; bottom:max(12px, env(safe-area-inset-bottom)); z-index:1000; background:var(--panel); backdrop-filter:blur(10px); border:1px solid var(--line); border-radius:14px; padding:10px 12px; font-size:13px; color:var(--muted); }
    .leaflet-control-attribution { font-size:10px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel">
    <div class="row">
      <div>
        <div class="title">
          Kartoverlay
        </div>
        <div class="meta" id="status">
          Tryck på &quot;Visa min position&quot;.
        </div>
      </div>
      <div class="spacer"></div><button id="fitBtn">Visa hela kartan</button> <button class="primary" id="locateBtn">Visa min
        position</button>
      </div>
      </div>
      <div class="hint">
        Öppna sidan i mobilen över HTTPS, godkänn platsåtkomst och lägg gärna sidan på hemskärmen för app-lik känsla.
      </div>
  <script crossorigin="" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>






  const map = L.map('map', { zoomControl: true, preferCanvas: true }).setView([59.62457143810071, 17.12804563833819], 13);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap' }).addTo(map);
    L.tileLayer('https://mapwarper.net/maps/tile/106490/{z}/{x}/{y}.png', { opacity: 0.82, maxZoom: 22, attribution: 'Overlay: MapWarper' }).addTo(map);
              const overlayBounds = L.latLngBounds([[59.62, 17.125], [59.63, 17.13]]);
    map.fitBounds(overlayBounds);
    let marker = null, accuracyCircle = null;
    const statusEl = document.getElementById('status');
    const locateBtn = document.getElementById('locateBtn');
    document.getElementById('fitBtn').addEventListener('click', () => map.fitBounds(overlayBounds));
    function setStatus(t){ statusEl.textContent = t; }
    function onLocationFound(e){
      const latlng = e.latlng, accuracy = Math.round(e.accuracy);
      if (!marker) {
        marker = L.marker(latlng).addTo(map);
        accuracyCircle = L.circle(latlng, { radius:e.accuracy, color:'#38bdf8', weight:1, fillColor:'#38bdf8', fillOpacity:0.12 }).addTo(map);
      } else {
        marker.setLatLng(latlng); accuracyCircle.setLatLng(latlng); accuracyCircle.setRadius(e.accuracy);
      }
      marker.bindPopup(`Din position<br>noggrannhet cirka ${accuracy} m`);
      map.setView(latlng, Math.max(map.getZoom(), 17));
      setStatus(`Position hittad. Noggrannhet cirka ${accuracy} m.`);
      locateBtn.textContent = 'Uppdatera position';
    }
    function onLocationError(){ setStatus('Kunde inte läsa position. Kontrollera platsåtkomst i webbläsaren.'); }
    map.on('locationfound', onLocationFound);
    map.on('locationerror', onLocationError);
    locateBtn.addEventListener('click', () => {
      setStatus('Letar efter position ...');
      map.locate({ setView:false, maxZoom:18, watch:false, enableHighAccuracy:true, timeout:15000 });
    });
  </script>
</body>
</html>
